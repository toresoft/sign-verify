<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1390 700" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1390" height="700" fill="#0f172a"/>
  <rect width="1390" height="700" fill="url(#grid)"/>

  <!-- ===== connection arrows (drawn first, masked by boxes) ===== -->
  <path d="M210,355 L255,355 L255,275 L296,275" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M395,310 L395,346" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M490,385 L540,385 L540,355 L586,355" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <path d="M780,355 L820,355 L820,125 L856,125" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M780,355 L820,355 L820,235 L856,235" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M780,355 L856,355" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M780,355 L820,355 L820,475 L856,475" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M780,355 L820,355 L820,585 L856,585" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="824" y="82" font-size="8" fill="#94a3b8">via domain/ports (interfaces)</text>

  <path d="M1070,125 L1136,125" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M1070,235 L1108,235" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="1110" cy="235" r="3" fill="#64748b"/>
  <text x="1120" y="239" font-size="8" font-style="italic" fill="#94a3b8">no external call</text>
  <path d="M1070,355 L1136,355" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M1070,475 L1136,475" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M1070,585 L1136,585" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== masking rects (opaque, same geometry as boxes) ===== -->
  <rect x="40" y="320" width="170" height="70" rx="6" fill="#0f172a"/>
  <rect x="300" y="240" width="190" height="70" rx="6" fill="#0f172a"/>
  <rect x="300" y="350" width="190" height="70" rx="6" fill="#0f172a"/>
  <rect x="590" y="320" width="190" height="70" rx="6" fill="#0f172a"/>
  <rect x="860" y="90"  width="210" height="70" rx="6" fill="#0f172a"/>
  <rect x="860" y="200" width="210" height="70" rx="6" fill="#0f172a"/>
  <rect x="860" y="320" width="210" height="70" rx="6" fill="#0f172a"/>
  <rect x="860" y="440" width="210" height="70" rx="6" fill="#0f172a"/>
  <rect x="860" y="550" width="210" height="70" rx="6" fill="#0f172a"/>
  <rect x="1140" y="90"  width="210" height="70" rx="6" fill="#0f172a"/>
  <rect x="1140" y="440" width="210" height="70" rx="6" fill="#0f172a"/>
  <rect x="1140" y="330" width="200" height="50" fill="#0f172a"/>
  <ellipse cx="1240" cy="330" rx="100" ry="10" fill="#0f172a"/>
  <ellipse cx="1240" cy="380" rx="100" ry="10" fill="#0f172a"/>
  <rect x="1140" y="560" width="200" height="50" fill="#0f172a"/>
  <ellipse cx="1240" cy="560" rx="100" ry="10" fill="#0f172a"/>
  <ellipse cx="1240" cy="610" rx="100" ry="10" fill="#0f172a"/>

  <!-- ===== styled boxes ===== -->
  <!-- Client (primary / cyan) -->
  <rect x="40" y="320" width="170" height="70" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="125" y="350" text-anchor="middle" font-size="12" font-weight="600" fill="white">Client</text>
  <text x="125" y="366" text-anchor="middle" font-size="9" fill="#94a3b8">REST + X-API-Key /</text>
  <text x="125" y="378" text-anchor="middle" font-size="9" fill="#94a3b8">Bearer JWT</text>

  <!-- Security Filter (alert / rose) -->
  <rect x="300" y="240" width="190" height="70" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="395" y="267" text-anchor="middle" font-size="12" font-weight="600" fill="white">Security Filter</text>
  <text x="395" y="283" text-anchor="middle" font-size="9" fill="#94a3b8">API key / OAuth</text>
  <text x="395" y="296" text-anchor="middle" font-size="9" fill="#94a3b8">security/</text>

  <!-- REST Controllers (secondary / emerald) -->
  <rect x="300" y="350" width="190" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="395" y="377" text-anchor="middle" font-size="12" font-weight="600" fill="white">REST Controllers</text>
  <text x="395" y="393" text-anchor="middle" font-size="9" fill="#94a3b8">api/ · RFC 9457</text>
  <text x="395" y="406" text-anchor="middle" font-size="9" fill="#94a3b8">problem+json errors</text>

  <!-- Application Services (secondary / emerald) -->
  <rect x="590" y="320" width="190" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="685" y="347" text-anchor="middle" font-size="12" font-weight="600" fill="white">Application Services</text>
  <text x="685" y="363" text-anchor="middle" font-size="9" fill="#94a3b8">application/ · use-case</text>
  <text x="685" y="376" text-anchor="middle" font-size="9" fill="#94a3b8">orchestration</text>

  <!-- Adapters (connector / orange) -->
  <rect x="860" y="90" width="210" height="70" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="965" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="white">DSS Adapter</text>
  <text x="965" y="134" text-anchor="middle" font-size="9" fill="#94a3b8">adapter/dss · DSS 6.4</text>

  <rect x="860" y="200" width="210" height="70" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="965" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="white">Crypto Adapter</text>
  <text x="965" y="244" text-anchor="middle" font-size="9" fill="#94a3b8">adapter/crypto · AES-256-GCM</text>
  <text x="965" y="257" text-anchor="middle" font-size="9" fill="#94a3b8">/ bcrypt</text>

  <rect x="860" y="320" width="210" height="70" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="965" y="350" text-anchor="middle" font-size="12" font-weight="600" fill="white">Persistence</text>
  <text x="965" y="366" text-anchor="middle" font-size="9" fill="#94a3b8">persistence/ · Spring Data JPA</text>

  <rect x="860" y="440" width="210" height="70" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="965" y="468" text-anchor="middle" font-size="12" font-weight="600" fill="white">Callback Adapter</text>
  <text x="965" y="484" text-anchor="middle" font-size="9" fill="#94a3b8">adapter/callback · HMAC</text>
  <text x="965" y="497" text-anchor="middle" font-size="9" fill="#94a3b8">dispatch</text>

  <rect x="860" y="550" width="210" height="70" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="965" y="578" text-anchor="middle" font-size="12" font-weight="600" fill="white">Storage Adapter</text>
  <text x="965" y="594" text-anchor="middle" font-size="9" fill="#94a3b8">adapter/storage ·</text>
  <text x="965" y="607" text-anchor="middle" font-size="9" fill="#94a3b8">filesystem port</text>

  <!-- External / data (accent amber for external systems, tertiary violet for data stores) -->
  <rect x="1140" y="90" width="210" height="70" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1245" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="white">EU LOTL / TSL</text>
  <text x="1245" y="134" text-anchor="middle" font-size="9" fill="#94a3b8">download + mirror</text>
  <text x="1245" y="147" text-anchor="middle" font-size="9" fill="#94a3b8">trust anchors</text>

  <!-- PostgreSQL cylinder (tertiary / violet) -->
  <rect x="1140" y="330" width="200" height="50" fill="rgba(76,29,149,0.4)"/>
  <ellipse cx="1240" cy="330" rx="100" ry="10" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <ellipse cx="1240" cy="380" rx="100" ry="10" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="1140" y1="330" x2="1140" y2="380" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="1340" y1="330" x2="1340" y2="380" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="1240" y="360" text-anchor="middle" font-size="12" font-weight="600" fill="white">PostgreSQL</text>

  <!-- External Callback (accent amber) -->
  <rect x="1140" y="440" width="210" height="70" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1245" y="468" text-anchor="middle" font-size="12" font-weight="600" fill="white">External Callback</text>
  <text x="1245" y="484" text-anchor="middle" font-size="9" fill="#94a3b8">client webhook · HMAC +</text>
  <text x="1245" y="497" text-anchor="middle" font-size="9" fill="#94a3b8">anti-SSRF</text>

  <!-- Filesystem cylinder (tertiary / violet) -->
  <rect x="1140" y="560" width="200" height="50" fill="rgba(76,29,149,0.4)"/>
  <ellipse cx="1240" cy="560" rx="100" ry="10" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <ellipse cx="1240" cy="610" rx="100" ry="10" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="1140" y1="560" x2="1140" y2="610" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="1340" y1="560" x2="1340" y2="610" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="1240" y="590" text-anchor="middle" font-size="12" font-weight="600" fill="white">Filesystem</text>
  <text x="1240" y="630" text-anchor="middle" font-size="9" fill="#94a3b8">job storage volume</text>

  <!-- ===== legend ===== -->
  <g font-size="9" fill="#94a3b8">
    <rect x="40" y="650" width="14" height="14" rx="3" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="60" y="661">Client</text>
    <rect x="130" y="650" width="14" height="14" rx="3" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
    <text x="150" y="661">Security</text>
    <rect x="230" y="650" width="14" height="14" rx="3" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
    <text x="250" y="661">api/ + application/</text>
    <rect x="400" y="650" width="14" height="14" rx="3" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <text x="420" y="661">Ports &amp; adapters / persistence</text>
    <rect x="630" y="650" width="14" height="14" rx="3" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="650" y="661">External system</text>
    <rect x="800" y="650" width="14" height="14" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="820" y="661">Data store</text>
  </g>

  <!-- ===== title ===== -->
  <text x="40" y="36" font-size="16" font-weight="700" fill="white">sign-verify — component map</text>
  <text x="40" y="56" font-size="11" fill="#94a3b8">Hexagonal architecture (ports &amp; adapters) — request flow left to right</text>
</svg>
