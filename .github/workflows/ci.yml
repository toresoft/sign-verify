name: CI

on:
  push:
    # Version tags, with or without a leading "v" (e.g. 0.9.20 or v0.9.20).
    tags: ["[0-9]*", "v[0-9]*"]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: toresoft/sign-verify

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------- #
  # validate                                                                     #
  # --------------------------------------------------------------------------- #
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B -ntp spotless:check

  # --------------------------------------------------------------------------- #
  # test  (unit + Testcontainers integration tests; Docker is available on the  #
  #        GitHub-hosted runner out of the box)                                 #
  # --------------------------------------------------------------------------- #
  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B -ntp verify
      - name: Upload test & coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            target/site/jacoco/
          if-no-files-found: ignore

  # --------------------------------------------------------------------------- #
  # build                                                                        #
  # --------------------------------------------------------------------------- #
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B -ntp -DskipTests package
      - uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/sign-verify-2.jar

  # --------------------------------------------------------------------------- #
  # package  → build & push image to Docker Hub                                  #
  #   Requires repository secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN           #
  #   On workflow_dispatch: only :sha and :latest are pushed (no semver tag).     #
  #   On tag pushes: semver tag + :latest are pushed.                            #
  # --------------------------------------------------------------------------- #
  package:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{version}}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------- #
  # security                                                                     #
  # --------------------------------------------------------------------------- #
  trivy:
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ needs.package.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

  dependency-check:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B -ntp -DskipTests org.owasp:dependency-check-maven:check
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          if-no-files-found: ignore
