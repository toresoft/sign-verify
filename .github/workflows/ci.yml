name: CI

on:
  push:
    # Version tags, with or without a leading "v" (e.g. 0.9.20 or v0.9.20).
    tags: ["[0-9]*", "v[0-9]*"]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: toresoft/sign-verify

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------- #
  # validate                                                                     #
  # --------------------------------------------------------------------------- #
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B -ntp spotless:check

  # --------------------------------------------------------------------------- #
  # test  (unit + Testcontainers integration tests; Docker is available on the  #
  #        GitHub-hosted runner out of the box)                                 #
  # --------------------------------------------------------------------------- #
  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B -ntp verify
      - name: Upload test & coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            target/site/jacoco/
          if-no-files-found: ignore

  # --------------------------------------------------------------------------- #
  # build                                                                        #
  # --------------------------------------------------------------------------- #
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B -ntp -DskipTests package
      - uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/sign-verify-2.jar

  # --------------------------------------------------------------------------- #
  # package  → build & push image to Docker Hub                                  #
  #   Requires repository secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN           #
  #   On workflow_dispatch: only :sha and :latest are pushed (no semver tag).     #
  #   On tag pushes: semver tag + :latest are pushed.                            #
  # --------------------------------------------------------------------------- #
  package:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{version}}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------- #
  # security                                                                     #
  # --------------------------------------------------------------------------- #
  trivy:
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # Cache key buckets by ISO week, not run_id: a run_id key never hits on the exact key
      # (only via restore-keys), so every run saved a brand-new ~hundreds-MB cache entry that
      # was never reused — silently filling the repo's 10GB cache quota and evicting the
      # actually-reused Maven cache. Weekly bucketing makes same-week runs hit the cache and
      # refreshes the DB at most once a week.
      - id: cache-week
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.trivy-cache
          key: trivy-db-${{ steps.cache-week.outputs.week }}
          restore-keys: |
            trivy-db-
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.trivy-cache
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ needs.package.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          output: trivy-report.txt
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
          if-no-files-found: ignore

  # Trivy filesystem scan: source-side dependency + Dockerfile/config misconfiguration check.
  # Complements the image scan (which runs post-build): this catches vulnerable Maven deps and
  # Dockerfile misconfigs before the image is even built, using Trivy's OCI-distributed DB
  # (already cached below) — no NVD sync, no API key.
  trivy-fs:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - id: cache-week
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.trivy-cache
          key: trivy-db-${{ steps.cache-week.outputs.week }}
          restore-keys: |
            trivy-db-
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.trivy-cache
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: table
          output: trivy-fs-report.txt
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt
          if-no-files-found: ignore

  # OSV-Scanner: dependency (SCA) verification against the OSV.dev database.
  # Replaces OWASP Dependency-Check, whose full NVD datastore download (~356k CVEs into a local
  # H2 store) was slow and corrupted itself on any throttled/aborted sync — even with an NVD API
  # key. OSV queries a pre-indexed vulnerability service instead: no NVD sync, no key. Runs the
  # official distroless image via `docker run` (identical invocation on GitLab), so there is no
  # CLI-version/PATH drift between the two CIs.
  osv-scan:
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # Resolve the full transitive dependency set into a CycloneDX SBOM (concrete versions), then
      # point OSV at the SBOM. Scanning the raw pom.xml instead makes OSV do live Maven-registry
      # transitive resolution, which is rate-limited (HTTP 429) and chokes on Spring Boot
      # BOM-managed (version-less) deps — silently yielding a false "0 vulnerabilities". The SBOM
      # has concrete versions, needs no live lookups, and is deterministic.
      # includeTestScope=true so the SBOM (and thus OSV) also covers test-only transitive deps —
      # Dependabot flags those too, and makeAggregateBom omits test scope by default.
      - name: Generate CycloneDX SBOM
        run: mvn -B -ntp -DskipTests -DincludeTestScope=true org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom
      # Redirect stdout host-side (not --output inside the container) to sidestep write-permission
      # issues on the mounted volume under the image's non-root user. `|| true` keeps this advisory
      # job green; the report still captures findings.
      - name: OSV-Scanner (dependency SCA)
        run: |
          docker run --rm -v "$PWD:/src" -w /src ghcr.io/google/osv-scanner:latest \
            scan source --format table ./target/bom.json > osv-report.txt || true
          cat osv-report.txt
      - name: OSV-Scanner SARIF (code scanning)
        run: |
          docker run --rm -v "$PWD:/src" -w /src ghcr.io/google/osv-scanner:latest \
            scan source --format sarif ./target/bom.json > osv-results.sarif || true
          # upload-sarif rejects an empty file; drop it when the scan produced no SARIF.
          [ -s osv-results.sarif ] || rm -f osv-results.sarif
      - name: Upload SARIF to code scanning
        if: hashFiles('osv-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-results.sarif
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osv-report
          path: osv-report.txt
          if-no-files-found: ignore

  # --------------------------------------------------------------------------- #
  # release  → GitHub Release with jar + vulnerability reports attached         #
  #   Tag pushes only (not workflow_dispatch, which has no version to release). #
  # --------------------------------------------------------------------------- #
  release:
    runs-on: ubuntu-latest
    needs: [build, trivy, osv-scan]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$TAG_NAME" \
            --repo "$REPO" \
            --generate-notes \
            artifacts/sign-verify-2.jar \
            artifacts/osv-report.txt \
            artifacts/trivy-report.txt
