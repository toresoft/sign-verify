openapi: 3.0.3
info:
  title: sign-verify-2 API
  version: 1.0.0
  description: REST service for electronic signature verification, extraction, profile and key management.
servers:
  - url: /
tags:
  - name: ApiKeys
  - name: Profiles
  - name: Verifications
  - name: Extractions
  - name: Tsl
  - name: Audit
  - name: Health

security:
  - ApiKeyAuth: []
  - OAuth2Bearer: []

paths:
  /actuator/health:
    get:
      tags: [Health]
      operationId: health
      security: []
      responses:
        '200': { description: ok }

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    OAuth2Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Problem:
      type: object
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, format: int32 }
        detail: { type: string }
        instance: { type: string }
        traceId: { type: string }

    Page:
      type: object
      properties:
        page: { type: integer }
        size: { type: integer }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }

    PrincipalRef:
      type: object
      properties:
        type: { type: string, enum: [API_KEY, OAUTH_USER, SYSTEM] }
        id: { type: string }
        displayName: { type: string }
