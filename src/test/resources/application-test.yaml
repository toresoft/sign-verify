spring:
  datasource:
    generate-unique-name: true
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ""
app:
  security:
    oauth:
      enabled: false
    bootstrap-key-file: ${java.io.tmpdir}/sign-verify-test/bootstrap-api-key.txt
    master-key: jmXybkAUJpitU/086qz5mmCmT7DoMqibeEfZ6XwMF9I=
  storage:
    jobs-dir: ${java.io.tmpdir}/sign-verify-test/jobs
  dss:
    cache-dir: ${java.io.tmpdir}/sign-verify-test/dss-cache
  tsl:
    refresh:
      startup-mode: SKIP
    sources:
      - id: eu-lotl
        type: LOTL
        url: https://ec.europa.eu/tools/lotl/eu-lotl.xml
        pivot-support: true
        oj-keystore-path: classpath:keystore/oj-keystore.p12
        oj-keystore-password-env: TEST_KEYSTORE_PASSWORD
        oj-url: https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=uriserv:OJ.C_.2019.276.01.0001.01.ENG
  async:
    max-pending-per-principal: 5
    max-pending-global: 100
    job-ttl: PT24H
    max-pickup-attempts: 3
    input-retention: P7D
    result-retention: P30D
    tombstone-retention: P90D
    cleanup:
      cron: "0 0 3 * * *"
    worker:
      poll-interval: PT60S
  callback:
    timeout: PT5S
    allow-http: true
    block-private-networks: false
    max-attempts: 3
    backoff: PT5S,PT30S,PT2M
    success-statuses: 200,202
    non-retryable-statuses: 400,401,403,404,410
    worker:
      poll-interval: PT30S

# Sentry must be fully inert during tests (no network calls, no background threads)
sentry:
  dsn: ""
