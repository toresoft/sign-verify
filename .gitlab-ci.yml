stages: [validate, test, build, package, security]

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  MAVEN_CLI_OPTS: "-B -e -ntp"
  IMAGE_NAME: "docker.io/toresoft/sign-verify"
  DOCKER_BUILDKIT: "1"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .m2/repository

default:
  image: maven:3.9-eclipse-temurin-21

# --------------------------------------------------------------------------- #
# validate                                                                     #
# --------------------------------------------------------------------------- #
validate:format:
  stage: validate
  script: mvn $MAVEN_CLI_OPTS spotless:check

# --------------------------------------------------------------------------- #
# test  (unit + Testcontainers integration tests via dind)                    #
# --------------------------------------------------------------------------- #
test:verify:
  stage: test
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    TESTCONTAINERS_HOST_OVERRIDE: "docker"
    TESTCONTAINERS_RYUK_DISABLED: "true"
  script:
    - mvn $MAVEN_CLI_OPTS verify
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml
        - target/failsafe-reports/TEST-*.xml
    paths:
      - target/site/jacoco/
    expire_in: 1 week

# --------------------------------------------------------------------------- #
# build                                                                        #
# --------------------------------------------------------------------------- #
build:jar:
  stage: build
  script: mvn $MAVEN_CLI_OPTS -DskipTests package
  artifacts:
    paths:
      - target/sign-verify-2.jar
    expire_in: 1 week

# --------------------------------------------------------------------------- #
# package  → build & push image to Docker Hub                                  #
#   Requires CI/CD variables (Settings → CI/CD → Variables, masked):          #
#     DOCKERHUB_USERNAME, DOCKERHUB_TOKEN                                      #
# Runs only on the default branch and on tags.                                #
# --------------------------------------------------------------------------- #
package:docker:
  stage: package
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin docker.io
  script:
    - docker build -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" .
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" "$IMAGE_NAME:$CI_COMMIT_TAG"
        docker push "$IMAGE_NAME:$CI_COMMIT_TAG"
      fi
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" "$IMAGE_NAME:latest"
        docker push "$IMAGE_NAME:latest"
      fi

# --------------------------------------------------------------------------- #
# security                                                                     #
# --------------------------------------------------------------------------- #
security:image-scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  variables:
    TRIVY_USERNAME: "$DOCKERHUB_USERNAME"
    TRIVY_PASSWORD: "$DOCKERHUB_TOKEN"
  script:
    - trivy image --no-progress --severity HIGH,CRITICAL --exit-code 0 "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
  allow_failure: true

security:dependency-scan:
  stage: security
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests org.owasp:dependency-check-maven:check
  artifacts:
    when: always
    paths:
      - target/dependency-check-report.html
    expire_in: 1 week
  allow_failure: true
