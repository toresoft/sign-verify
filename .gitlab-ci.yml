stages: [validate, test, package, security]

# --------------------------------------------------------------------------- #
# workflow:rules — pipeline solo su tag o avvio manuale                       #
#   La pipeline parte esclusivamente quando si crea un tag di rilascio        #
#   oppure quando viene avviata manualmente dalla UI di GitLab.               #
#   Push su branch (incluso main) non attivano alcuna pipeline.                #
# --------------------------------------------------------------------------- #
workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  MAVEN_CLI_OPTS: "-B -e -ntp"
  IMAGE_NAME: "docker.io/toresoft/sign-verify"
  DOCKER_BUILDKIT: "1"

# --------------------------------------------------------------------------- #
# cache: basata su pom.xml (si invalida solo quando cambiano le dipendenze)    #
#   prefix bumped to maven-v2 to abandon a poisoned cache entry: a transient   #
#   download corrupted dss-policy-jaxb-6.4.jar, breaking the DSS               #
#   ValidationPolicyFactory ServiceLoader at runtime (HTTP 400 "invalid        #
#   validation policy") only on the runner. A clean .m2 resolves fine.         #
# --------------------------------------------------------------------------- #
cache:
  key:
    files:
      - pom.xml
    prefix: maven-v2
  paths:
    - .m2/repository

# --------------------------------------------------------------------------- #
# default: interruptible + retry per job transienti                            #
# --------------------------------------------------------------------------- #
default:
  image: maven:3.9-eclipse-temurin-21
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# --------------------------------------------------------------------------- #
# validate                                                                     #
# --------------------------------------------------------------------------- #
validate:format:
  stage: validate
  script: mvn $MAVEN_CLI_OPTS spotless:check

# --------------------------------------------------------------------------- #
# test  (unit + integration tests with H2 in-memory DB)                       #
#   needs: [] → parte subito, non aspetta validate:format                      #
#   artifact: include il jar per package:docker + JUnit reports per GitLab    #
# --------------------------------------------------------------------------- #
test:verify:
  stage: test
  needs: []
  script:
    - mvn $MAVEN_CLI_OPTS verify
    # Emit a "Total coverage: NN%" line for the coverage regex below to parse
    # (JaCoCo writes no overall total to stdout). Block scalar so the ':' and
    # '%' inside the awk program don't break YAML parsing. Integer % so the
    # regex, which captures digits immediately before '%', ignores decimals.
    - |
      awk -F, 'NR>1{m+=$4;c+=$5} END{if(c+m>0) printf "Total coverage: %d%%\n", (c/(c+m))*100}' target/site/jacoco/jacoco.csv
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml
        - target/failsafe-reports/TEST-*.xml
    paths:
      - target/site/jacoco/
      - target/sign-verify-2.jar
    expire_in: 1 week

# --------------------------------------------------------------------------- #
# package  → build & push image to Docker Hub                                  #
#   Requires CI/CD variables (Settings → CI/CD → Variables, masked):          #
#     DOCKERHUB_USERNAME, DOCKERHUB_TOKEN                                      #
#   needs: ["test:verify"] → parte appena test:verify finisce                  #
#   --cache-from → riutilizza i layer dell'immagine precedente                 #
# --------------------------------------------------------------------------- #
package:docker:
  stage: package
  image: docker:24
  needs: ["test:verify"]
  rules:
    - if: '$CI_COMMIT_TAG'
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    # Strip stray whitespace from credentials, then log in.
    # Credential metadata (lengths, charset validity) leaks entropy about the secrets and is
    # readable by every project member in the job log, so it is gated behind CI_DEBUG and off by
    # default. The Docker Hub API's own (clear) error message — which docker login hides behind the
    # generic "malformed HTTP Authorization header" — is still surfaced unconditionally below.
    - |
      apk add --no-cache curl >/dev/null 2>&1 || true
      U="$(printf %s "$DOCKERHUB_USERNAME" | tr -d '[:space:]')"
      T="$(printf %s "$DOCKERHUB_TOKEN" | tr -d '[:space:]')"
      if [ -n "$CI_DEBUG" ]; then
        echo "diag: user_len=${#U} token_len=${#T}"
        printf %s "$U" | LC_ALL=C grep -qE '^[A-Za-z0-9._-]+$' && echo "diag: user_charset=clean" || echo "diag: user_charset=HAS_UNEXPECTED_CHARS"
        printf %s "$T" | LC_ALL=C grep -qE '^[A-Za-z0-9_-]+$' && echo "diag: token_charset=clean" || echo "diag: token_charset=HAS_UNEXPECTED_CHARS"
      fi
      if [ -z "$U" ] || [ -z "$T" ]; then echo "FATAL: credentials empty (check CI/CD Variables: Protected vs ref, scope, type=Variable)"; exit 1; fi
      code=$(curl -s -o /tmp/login.json -w '%{http_code}' -H 'Content-Type: application/json' -d "{\"username\":\"$U\",\"password\":\"$T\"}" https://hub.docker.com/v2/users/login/)
      echo "diag: hub_api_login_http=$code"
      grep -o '"detail":"[^"]*"' /tmp/login.json 2>/dev/null || true
      printf %s "$T" | docker login -u "$U" --password-stdin docker.io
  script:
    # Pull latest image for layer caching (ignore failure if image doesn't exist yet)
    - docker pull "$IMAGE_NAME:latest" || true
    - docker build --cache-from "$IMAGE_NAME:latest" -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" .
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - docker tag "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" "$IMAGE_NAME:$CI_COMMIT_TAG"
    - docker push "$IMAGE_NAME:$CI_COMMIT_TAG"
    - docker tag "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:latest"

# --------------------------------------------------------------------------- #
# package  → push DOCKERHUB.md as the Docker Hub repository description         #
#   Updates the registry overview (full_description) shown on the image page.  #
#   Reuses DOCKERHUB_USERNAME / DOCKERHUB_TOKEN. Runs on tag only.               #
#   needs: ["test:verify"] → gated behind the tests so a failing build never     #
#   publishes an updated Docker Hub description.                                  #
# --------------------------------------------------------------------------- #
package:dockerhub-readme:
  stage: package
  image: alpine:3
  needs: ["test:verify"]
  rules:
    - if: '$CI_COMMIT_TAG'
      changes:
        - DOCKERHUB.md
  script:
    - apk add --no-cache curl jq >/dev/null
    - |
      U="$(printf %s "$DOCKERHUB_USERNAME" | tr -d '[:space:]')"
      T="$(printf %s "$DOCKERHUB_TOKEN"   | tr -d '[:space:]')"
      if [ -z "$U" ] || [ -z "$T" ]; then echo "FATAL: Docker Hub credentials missing"; exit 1; fi
      JWT=$(curl -s -H 'Content-Type: application/json' \
        -d "{\"username\":\"$U\",\"password\":\"$T\"}" \
        https://hub.docker.com/v2/users/login/ | jq -r .token)
      if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then echo "FATAL: Docker Hub login failed"; exit 1; fi
      # jq -Rs serializes the whole file into a safely-escaped JSON string.
      BODY=$(jq -Rs '{full_description: .}' DOCKERHUB.md)
      code=$(curl -s -o /tmp/resp.json -w '%{http_code}' -X PATCH \
        -H "Authorization: JWT $JWT" -H 'Content-Type: application/json' \
        -d "$BODY" \
        "https://hub.docker.com/v2/repositories/${IMAGE_NAME#docker.io/}/")
      echo "dockerhub readme update http=$code"
      [ "$code" = "200" ] || { cat /tmp/resp.json; exit 1; }

# --------------------------------------------------------------------------- #
# security                                                                     #
#   image-scan: needs package:docker (parte appena l'immagine è pushata)       #
#   dependency-scan: needs test:verify (parte in parallelo con package:docker) #
# --------------------------------------------------------------------------- #
security:image-scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs: ["package:docker"]
  variables:
    TRIVY_USERNAME: "$DOCKERHUB_USERNAME"
    TRIVY_PASSWORD: "$DOCKERHUB_TOKEN"
  script:
    # --exit-code 1 makes the job fail when HIGH/CRITICAL CVEs are found; allow_failure keeps it
    # non-blocking but surfaces it as a visible "allowed failure" instead of a silent pass.
    - trivy image --no-progress --severity HIGH,CRITICAL --exit-code 1 "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
  allow_failure: true

security:dependency-scan:
  stage: security
  needs: ["test:verify"]
  # Persist the OWASP NVD datastore between runs. Without it the job re-downloads
  # ~356k CVEs every time; a throttled/aborted download corrupts the H2 store
  # (odc.mv.db) and the analysis fails ("The database has been closed").
  cache:
    key: dependency-check-nvd-data
    paths:
      - .dependency-check-data/
  variables:
    # An NVD API key (CI/CD variable, masked) avoids HTTP 429 rate limiting.
    # Get one free: https://nvd.nist.gov/developers/request-an-api-key
    DC_OPTS: >-
      -DdataDirectory=.dependency-check-data
      -DnvdApiKey=$NVD_API_KEY
      -DnvdApiDelay=6000
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests $DC_OPTS org.owasp:dependency-check-maven:check
  artifacts:
    when: always
    paths:
      - target/dependency-check-report.html
    expire_in: 1 week
  allow_failure: true
